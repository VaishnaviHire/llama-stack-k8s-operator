name: Build Operator Image

on:
  pull_request:
    types: [opened, synchronize, closed]

permissions:
  contents: read
  packages: write

jobs:
  build-pr-image:
    if: github.event.action == 'opened'|| github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go 1.21
        uses: actions/setup-go@v3
        with:
          go-version: '1.21'
          
      - name: Checkout PR branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Log current commit
        run: echo "Building image from commit ${{ github.event.pull_request.head.sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PR image
        run: |
          make docker-build docker-push -e IMG=ghcr.io/${{ github.repository }}/controller:pr-${{ github.event.pull_request.numbe }} -e IMAGE_BUILDER=docker

  build-latest-image:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go 1.21
        uses: actions/setup-go@v3
        with:
          go-version: '1.21'
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push latest image
        run: make docker-build docker-push -e ghcr.io/${{ github.repository }}/controller:latest
